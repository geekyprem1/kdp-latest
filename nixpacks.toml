# Nixpacks build config (Coolify / Railway).
#
# We DON'T let Puppeteer download its own Chromium during `npm ci` — that needs
# extra RAM and disk in the build container (often OOM-kills the build). Instead
# we install the system chromium via apt and point Puppeteer at it via env vars.
# Runtime libs Chromium needs are already pulled in by Puppeteer's autodetection.

[phases.setup]
aptPkgs = [
  "unzip", "tar", "gzip", "curl", "wget",
  "chromium-browser",
]

[variables]
# Skip the bundled Chromium download during `npm ci` (saves ~300 MB + build RAM).
PUPPETEER_SKIP_DOWNLOAD = "true"
# Tell Puppeteer/our code to launch the apt-installed Chromium instead.
PUPPETEER_EXECUTABLE_PATH = "/usr/bin/chromium-browser"
