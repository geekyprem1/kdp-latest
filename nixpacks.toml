# Nixpacks build config (Coolify / Railway).
#
# Two things this file does:
#   1. Provide `unzip`/`tar` so Puppeteer's postinstall can extract its bundled
#      Chromium during `npm ci` (otherwise it errors out asking for those tools).
#   2. Install Chromium's runtime shared libraries (libglib, libnss, libxkbcommon,
#      libgbm, libgtk-3, libasound, fonts…) so the bundled Chromium actually
#      launches at runtime. Without these you get errors like:
#        "error while loading shared libraries: libglib-2.0.so.0".
#      Ubuntu 24.04 (the Nixpacks base) renamed several to *t64 — names below
#      are the 24.04 ones.
#
# We deliberately do NOT use apt `chromium-browser` on 24.04 — it's a snap
# launcher shim that refuses to start in a container. The bundled Puppeteer
# Chromium is real and works fine once these libs are present.

[phases.setup]
aptPkgs = [
  # build-time
  "unzip", "tar", "gzip",
  # Chromium runtime deps (Ubuntu 24.04 names)
  "ca-certificates",
  "fonts-liberation",
  "libasound2t64",
  "libatk-bridge2.0-0t64",
  "libatk1.0-0t64",
  "libcairo2",
  "libcups2t64",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libglib2.0-0t64",
  "libgtk-3-0t64",
  "libnspr4",
  "libnss3",
  "libpango-1.0-0",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxkbcommon0",
  "libxrandr2",
  "libxshmfence1",
]
